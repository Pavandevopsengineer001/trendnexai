version: '3.9'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: trendnexai-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-password}
      MONGO_INITDB_DATABASE: trendnexai
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - trendnexai-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: trendnexai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - trendnexai-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: trendnexai-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      ENV: ${ENV:-development}
      DEBUG: ${DEBUG:-true}
      MONGODB_URI: mongodb://admin:password@mongodb:27017/trendnexai?authSource=admin
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      NEWS_API_KEY: ${NEWS_API_KEY}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:8000,http://frontend:3000
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - trendnexai-network
    volumes:
      - ./backend:/app/backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Celery Worker
  celery-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: trendnexai-celery-worker
    restart: unless-stopped
    command: celery -A app.celery_app worker -l info
    environment:
      ENV: ${ENV:-development}
      MONGODB_URI: mongodb://admin:password@mongodb:27017/trendnexai?authSource=admin
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      NEWS_API_KEY: ${NEWS_API_KEY}
    depends_on:
      - mongodb
      - redis
      - backend
    networks:
      - trendnexai-network
    volumes:
      - ./backend:/app/backend

  # Celery Beat (Scheduler)
  celery-beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: trendnexai-celery-beat
    restart: unless-stopped
    command: celery -A app.celery_app beat -l info
    environment:
      ENV: ${ENV:-development}
      MONGODB_URI: mongodb://admin:password@mongodb:27017/trendnexai?authSource=admin
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      NEWS_API_KEY: ${NEWS_API_KEY}
    depends_on:
      - mongodb
      - redis
      - backend
    networks:
      - trendnexai-network
    volumes:
      - ./backend:/app/backend

  # Next.js Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trendnexai-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NODE_ENV: production
    depends_on:
      - backend
    networks:
      - trendnexai-network
    volumes:
      - ./app:/app/app
      - ./components:/app/components
      - ./lib:/app/lib
      - ./public:/app/public
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  trendnexai-network:
    driver: bridge

volumes:
  mongodb_data:
  mongodb_config:
  redis_data:
